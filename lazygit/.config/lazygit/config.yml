gui:
  theme:
    activeBorderColor:
      - cyan
      - bold
    inactiveBorderColor:
      - default
    searchingActiveBorderColor:
      - yellow
      - bold
    optionsTextColor:
      - blue
    selectedLineBgColor:
      - "#EBDBB2"
    selectedRangeBgColor:
      - "#EBDBB2"
    inactiveViewSelectedLineBgColor:
      - default
    cherryPickedCommitFgColor:
      - blue
    cherryPickedCommitBgColor:
      - cyan
    markedBaseCommitFgColor:
      - blue
    markedBaseCommitBgColor:
      - yellow
    unstagedChangesColor:
      - red
    defaultFgColor:
      - default
git:
  pagers:
    - colorArg: always
      pager: >-
        delta --light --paging=never --line-numbers --syntax-theme OneHalfLight  --hyperlinks --hyperlinks-file-link-format="lazygit-edit://{path}:{line}"
